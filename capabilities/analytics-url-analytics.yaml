naftiko: 1.0.0-alpha2
info:
  label: Contentstack Analytics API — URL Analytics
  description: 'Contentstack Analytics API — URL Analytics. 1 operations. Lead operation: Get top URLs by request count. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - URL Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-url-analytics
    baseUri: https://api.contentstack.io
    description: Contentstack Analytics API — URL Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-v2-top-urls
      path: /analytics/v2/top-urls
      operations:
      - name: gettopurls
        method: POST
        description: Get top URLs by request count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CONTENTSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-url-analytics-rest
    port: 8080
    description: REST adapter for Contentstack Analytics API — URL Analytics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/v2/top-urls
      name: analytics-v2-top-urls
      description: REST surface for analytics-v2-top-urls.
      operations:
      - method: POST
        name: gettopurls
        description: Get top URLs by request count
        call: analytics-url-analytics.gettopurls
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-url-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Analytics API — URL Analytics. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-top-urls-request-count
      description: Get top URLs by request count
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: analytics-url-analytics.gettopurls
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
