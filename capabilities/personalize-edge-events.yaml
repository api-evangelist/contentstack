naftiko: 1.0.0-alpha2
info:
  label: Contentstack Personalize Edge API — Events
  description: 'Contentstack Personalize Edge API — Events. 1 operations. Lead operation: Track user events. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: personalize-edge-events
    baseUri: https://personalize-edge.contentstack.com
    description: Contentstack Personalize Edge API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: trackevents
        method: POST
        description: Track user events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: personalize-edge-events-rest
    port: 8080
    description: REST adapter for Contentstack Personalize Edge API — Events. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: POST
        name: trackevents
        description: Track user events
        call: personalize-edge-events.trackevents
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: personalize-edge-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Personalize Edge API — Events. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: track-user-events
      description: Track user events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalize-edge-events.trackevents
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
