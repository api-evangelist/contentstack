naftiko: 1.0.0-alpha2
info:
  label: Contentstack Personalize Management API — Events
  description: 'Contentstack Personalize Management API — Events. 2 operations. Lead operation: Get all events. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: personalize-management-events
    baseUri: https://personalize-api.contentstack.com
    description: Contentstack Personalize Management API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: getallevents
        method: GET
        description: Get all events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createevent
        method: POST
        description: Create an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CONTENTSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: personalize-management-events-rest
    port: 8080
    description: REST adapter for Contentstack Personalize Management API — Events. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: getallevents
        description: Get all events
        call: personalize-management-events.getallevents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createevent
        description: Create an event
        call: personalize-management-events.createevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: personalize-management-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Personalize Management API — Events. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-all-events
      description: Get all events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: personalize-management-events.getallevents
      outputParameters:
      - type: object
        mapping: $.
    - name: create-event
      description: Create an event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalize-management-events.createevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
