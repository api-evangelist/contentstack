naftiko: 1.0.0-alpha2
info:
  label: Contentstack Analytics API — Cache Analytics
  description: 'Contentstack Analytics API — Cache Analytics. 1 operations. Lead operation: Get CDN cache usage metrics. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Cache Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-cache-analytics
    baseUri: https://api.contentstack.io
    description: Contentstack Analytics API — Cache Analytics business capability. Self-contained, no shared references.
    resources:
    - name: analytics-v2-cache-usage
      path: /analytics/v2/cache-usage
      operations:
      - name: getcacheusage
        method: POST
        description: Get CDN cache usage metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CONTENTSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-cache-analytics-rest
    port: 8080
    description: REST adapter for Contentstack Analytics API — Cache Analytics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analytics/v2/cache-usage
      name: analytics-v2-cache-usage
      description: REST surface for analytics-v2-cache-usage.
      operations:
      - method: POST
        name: getcacheusage
        description: Get CDN cache usage metrics
        call: analytics-cache-analytics.getcacheusage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-cache-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Analytics API — Cache Analytics. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-cdn-cache-usage-metrics
      description: Get CDN cache usage metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: analytics-cache-analytics.getcacheusage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
