naftiko: 1.0.0-alpha2
info:
  label: Contentstack Content Delivery API — Assets
  description: 'Contentstack Content Delivery API — Assets. 2 operations. Lead operation: Get all assets. Self-contained Naftiko
    capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-delivery-assets
    baseUri: https://cdn.contentstack.io/v3
    description: Contentstack Content Delivery API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: assets
      path: /assets
      operations:
      - name: getallassets
        method: GET
        description: Get all assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include_count
          in: query
          type: boolean
          description: Set to true to include the total count of assets in the response.
    - name: assets-asset_uid
      path: /assets/{asset_uid}
      operations:
      - name: getsingleasset
        method: GET
        description: Get a single asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.CONTENTSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: content-delivery-assets-rest
    port: 8080
    description: REST adapter for Contentstack Content Delivery API — Assets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/assets
      name: assets
      description: REST surface for assets.
      operations:
      - method: GET
        name: getallassets
        description: Get all assets
        call: content-delivery-assets.getallassets
        with:
          include_count: rest.include_count
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/{asset-uid}
      name: assets-asset-uid
      description: REST surface for assets-asset_uid.
      operations:
      - method: GET
        name: getsingleasset
        description: Get a single asset
        call: content-delivery-assets.getsingleasset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-delivery-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Content Delivery API — Assets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-all-assets
      description: Get all assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-delivery-assets.getallassets
      with:
        include_count: tools.include_count
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-asset
      description: Get a single asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-delivery-assets.getsingleasset
      outputParameters:
      - type: object
        mapping: $.
