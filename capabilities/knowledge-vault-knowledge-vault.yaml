naftiko: 1.0.0-alpha2
info:
  label: Contentstack Knowledge Vault API — Knowledge Vault
  description: 'Contentstack Knowledge Vault API — Knowledge Vault. 3 operations. Lead operation: Ingest content into Knowledge
    Vault. Self-contained Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Knowledge Vault
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: knowledge-vault-knowledge-vault
    baseUri: https://ai.contentstack.com
    description: Contentstack Knowledge Vault API — Knowledge Vault business capability. Self-contained, no shared references.
    resources:
    - name: v1-knowledge-vault
      path: /v1/knowledge-vault/
      operations:
      - name: ingestknowledgevaultcontent
        method: POST
        description: Ingest content into Knowledge Vault
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-knowledge-vault-content_uid
      path: /v1/knowledge-vault/{content_uid}
      operations:
      - name: updateknowledgevaultcontent
        method: PUT
        description: Update Knowledge Vault content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteknowledgevaultcontent
        method: DELETE
        description: Delete Knowledge Vault content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CONTENTSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: knowledge-vault-knowledge-vault-rest
    port: 8080
    description: REST adapter for Contentstack Knowledge Vault API — Knowledge Vault. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/knowledge-vault
      name: v1-knowledge-vault
      description: REST surface for v1-knowledge-vault.
      operations:
      - method: POST
        name: ingestknowledgevaultcontent
        description: Ingest content into Knowledge Vault
        call: knowledge-vault-knowledge-vault.ingestknowledgevaultcontent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/knowledge-vault/{content-uid}
      name: v1-knowledge-vault-content-uid
      description: REST surface for v1-knowledge-vault-content_uid.
      operations:
      - method: PUT
        name: updateknowledgevaultcontent
        description: Update Knowledge Vault content
        call: knowledge-vault-knowledge-vault.updateknowledgevaultcontent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteknowledgevaultcontent
        description: Delete Knowledge Vault content
        call: knowledge-vault-knowledge-vault.deleteknowledgevaultcontent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: knowledge-vault-knowledge-vault-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Knowledge Vault API — Knowledge Vault. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: ingest-content-knowledge-vault
      description: Ingest content into Knowledge Vault
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: knowledge-vault-knowledge-vault.ingestknowledgevaultcontent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-knowledge-vault-content
      description: Update Knowledge Vault content
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: knowledge-vault-knowledge-vault.updateknowledgevaultcontent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-knowledge-vault-content
      description: Delete Knowledge Vault content
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: knowledge-vault-knowledge-vault.deleteknowledgevaultcontent
      outputParameters:
      - type: object
        mapping: $.
