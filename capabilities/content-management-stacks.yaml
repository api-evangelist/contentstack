naftiko: 1.0.0-alpha2
info:
  label: Contentstack Content Management API — Stacks
  description: 'Contentstack Content Management API — Stacks. 5 operations. Lead operation: Get all stacks. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Stacks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-management-stacks
    baseUri: https://api.contentstack.io/v3
    description: Contentstack Content Management API — Stacks business capability. Self-contained, no shared references.
    resources:
    - name: stacks
      path: /stacks
      operations:
      - name: getallstacks
        method: GET
        description: Get all stacks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createstack
        method: POST
        description: Create a stack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: stacks-api_key
      path: /stacks/{api_key}
      operations:
      - name: getstack
        method: GET
        description: Get a stack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatestack
        method: PUT
        description: Update a stack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletestack
        method: DELETE
        description: Delete a stack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: authtoken
      value: '{{env.CONTENTSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: content-management-stacks-rest
    port: 8080
    description: REST adapter for Contentstack Content Management API — Stacks. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/stacks
      name: stacks
      description: REST surface for stacks.
      operations:
      - method: GET
        name: getallstacks
        description: Get all stacks
        call: content-management-stacks.getallstacks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createstack
        description: Create a stack
        call: content-management-stacks.createstack
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stacks/{api-key}
      name: stacks-api-key
      description: REST surface for stacks-api_key.
      operations:
      - method: GET
        name: getstack
        description: Get a stack
        call: content-management-stacks.getstack
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatestack
        description: Update a stack
        call: content-management-stacks.updatestack
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletestack
        description: Delete a stack
        call: content-management-stacks.deletestack
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-management-stacks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Content Management API — Stacks. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-all-stacks
      description: Get all stacks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-management-stacks.getallstacks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-stack
      description: Create a stack
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: content-management-stacks.createstack
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stack
      description: Get a stack
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-management-stacks.getstack
      outputParameters:
      - type: object
        mapping: $.
    - name: update-stack
      description: Update a stack
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: content-management-stacks.updatestack
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-stack
      description: Delete a stack
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: content-management-stacks.deletestack
      outputParameters:
      - type: object
        mapping: $.
