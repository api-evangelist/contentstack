      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: getallprojects
        description: Get all projects
        call: launch-projects.getallprojects
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Create a project
        call: launch-projects.createproject
        with:
