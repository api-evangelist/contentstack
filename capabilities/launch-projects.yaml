    resources:
    - name: projects
      path: /projects
      operations:
      - name: getallprojects
        method: GET
        description: Get all projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-project_uid
      path: /projects/{project_uid}
      operations:
      - name: getproject
        method: GET
        description: Get a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproject
