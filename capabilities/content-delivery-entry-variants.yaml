naftiko: 1.0.0-alpha2
info:
  label: Contentstack Content Delivery API — Entry Variants
  description: 'Contentstack Content Delivery API — Entry Variants. 2 operations. Lead operation: Get all entry variants.
    Self-contained Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Entry Variants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-delivery-entry-variants
    baseUri: https://cdn.contentstack.io/v3
    description: Contentstack Content Delivery API — Entry Variants business capability. Self-contained, no shared references.
    resources:
    - name: content_types-content_type_uid-entries-entry_uid-variants
      path: /content_types/{content_type_uid}/entries/{entry_uid}/variants
      operations:
      - name: getallentryvariants
        method: GET
        description: Get all entry variants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content_types-content_type_uid-entries-entry_uid-variants-variant_uid
      path: /content_types/{content_type_uid}/entries/{entry_uid}/variants/{variant_uid}
      operations:
      - name: getsingleentryvariant
        method: GET
        description: Get a single entry variant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_key
      value: '{{env.CONTENTSTACK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: content-delivery-entry-variants-rest
    port: 8080
    description: REST adapter for Contentstack Content Delivery API — Entry Variants. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/content-types/{content-type-uid}/entries/{entry-uid}/variants
      name: content-types-content-type-uid-entries-entry-uid-variants
      description: REST surface for content_types-content_type_uid-entries-entry_uid-variants.
      operations:
      - method: GET
        name: getallentryvariants
        description: Get all entry variants
        call: content-delivery-entry-variants.getallentryvariants
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content-types/{content-type-uid}/entries/{entry-uid}/variants/{variant-uid}
      name: content-types-content-type-uid-entries-entry-uid-variants-variant-uid
      description: REST surface for content_types-content_type_uid-entries-entry_uid-variants-variant_uid.
      operations:
      - method: GET
        name: getsingleentryvariant
        description: Get a single entry variant
        call: content-delivery-entry-variants.getsingleentryvariant
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-delivery-entry-variants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Content Delivery API — Entry Variants. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-all-entry-variants
      description: Get all entry variants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-delivery-entry-variants.getallentryvariants
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-entry-variant
      description: Get a single entry variant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-delivery-entry-variants.getsingleentryvariant
      outputParameters:
      - type: object
        mapping: $.
