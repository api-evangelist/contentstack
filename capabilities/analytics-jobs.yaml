naftiko: 1.0.0-alpha2
info:
  label: Contentstack Analytics API — Jobs
  description: 'Contentstack Analytics API — Jobs. 1 operations. Lead operation: Get analytics job results. Self-contained
    Naftiko capability covering one Contentstack business surface.'
  tags:
  - Contentstack
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONTENTSTACK_API_KEY: CONTENTSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-jobs
    baseUri: https://api.contentstack.io
    description: Contentstack Analytics API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: analytics-v2-job-jobId-data
      path: /analytics/v2/job/{jobId}/data
      operations:
      - name: getjobdata
        method: GET
        description: Get analytics job results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CONTENTSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-jobs-rest
    port: 8080
    description: REST adapter for Contentstack Analytics API — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/analytics/v2/job/{jobid}/data
      name: analytics-v2-job-jobid-data
      description: REST surface for analytics-v2-job-jobId-data.
      operations:
      - method: GET
        name: getjobdata
        description: Get analytics job results
        call: analytics-jobs.getjobdata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Contentstack Analytics API — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-analytics-job-results
      description: Get analytics job results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: analytics-jobs.getjobdata
      outputParameters:
      - type: object
        mapping: $.
