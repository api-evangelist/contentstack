specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Contentstack
providerId: contentstack
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Headless CMS
  - Content Management
  - Personalization
  - AI
  - Real-Time CDP
  - Agentic Experience
description: Contentstack is a headless CMS (Contentstack AXP) packaged with personalization, real-time
  CDP, and agentic experience capabilities. Pricing is sales-led — the public site exposes "Start free"
  trial and "Request demo" CTAs but does not publish per-tier numeric prices. Stack quotas (content types,
  languages, environments, users, API requests) are configured per plan and negotiated with Contentstack.
notes: Contentstack's public pricing page does not surface specific per-tier prices or quotas; tiers
  are negotiated with sales. Documented rate limits (10 read/sec and 10 write/sec per organization, 1
  bulk-action/sec, configurable per plan) live in rate-limits/contentstack-rate-limits.yml. Reconcile
  per-tier numbers against an active Contentstack contract.
sources:
  - https://www.contentstack.com/pricing
  - https://www.contentstack.com/docs/developers/apis/content-management-api
plans:
  - id: contentstack-free-trial
    name: Free Trial
    type: free
    description: Limited-scope trial of Contentstack AXP / CMS available via "Start free" registration.
      Quotas and duration are not publicly published.
    entries:
      - label: Trial Access
        description: Time-limited evaluation; quotas not publicly published
        name: trial_access
        type: subscription
        metric: month
        limit: 'see Contentstack trial terms'
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Headless CMS Evaluation
      - name: Community Documentation
  - id: contentstack-business
    name: Business
    type: subscription
    description: Standard production tier for Contentstack AXP. Per-stack quotas (content types, languages,
      environments, users, API requests) are negotiated with sales.
    entries:
      - label: Subscription
        description: Annual subscription; pricing not publicly published
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
      - label: API Requests
        description: Per-organization API request quota; default 10 read/sec + 10 write/sec, configurable
          per plan
        name: api_requests
        type: rate
        metric: requests_per_second
        limit: 10
        timeFrame: second
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Headless CMS
      - name: Content Management API
      - name: Content Delivery API
      - name: Webhooks
      - name: Standard Support
  - id: contentstack-enterprise
    name: Enterprise / AXP
    type: enterprise
    description: Enterprise tier including the full Contentstack Agentic Experience Platform — personalization
      engine, real-time data activation, no-code agents and automations, brand-aware AI, AI writing assistant,
      visual builder, granular permissions, and custom workflows. Pricing is custom-quoted; rate limits
      are configurable.
    entries:
      - label: Subscription
        description: Custom-quoted enterprise subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: API Requests
        description: Configurable per-organization API rate; raised on request
        name: api_requests
        type: rate
        metric: requests_per_second
        limit: 'configurable per plan'
        timeFrame: second
        geo: configurable
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Agentic Experience Platform (AXP)
      - name: Personalization Engine
      - name: Real-Time CDP
      - name: No-Code Agents & Automations
      - name: Brand-Aware AI
      - name: AI Writing Assistant
      - name: Visual Builder / Live Preview
      - name: Granular Permissions
      - name: Custom Workflows
      - name: Enterprise SLA & Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
