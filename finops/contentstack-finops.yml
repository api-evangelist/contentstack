description: 'FOCUS-aligned FinOps for Contentstack: enterprise SaaS subscription where the headless
  CMS, personalization, real-time CDP, and agentic capabilities are bundled into a Contentstack AXP plan.
  Contentstack does not publish per-call API pricing; spend is anchored to the annual contract plus per-stack
  / per-user / per-environment expansion charges negotiated with sales.'
notes: Per-tier pricing is sales-led and not publicly published. Meters in this artifact reflect the
  consumption signals consumers should track for chargeback even though Contentstack bills as a bundled
  subscription.
sources:
  - https://www.contentstack.com/pricing
  - https://www.contentstack.com/docs/developers/apis/content-management-api
billingModel:
  pricingCategory: Enterprise Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Contentstack
  ServiceCategory: Headless CMS / Digital Experience Platform
  ProviderName: Contentstack
  PublisherName: Contentstack Inc.
  InvoiceIssuerName: Contentstack Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription
    description: Annual Contentstack subscription (Business / Enterprise / AXP)
    unit: month
    aggregation: max
    dimensions:
      - tier
      - organization
  - name: stacks
    description: Number of provisioned content stacks against the contract
    unit: stack
    aggregation: max
    dimensions:
      - organization
      - environment
  - name: users
    description: Active CMS user seats
    unit: seat
    aggregation: max
    dimensions:
      - organization
      - role
  - name: cm_api_requests
    description: Content Management API request volume (10 read/sec + 10 write/sec default ceiling per
      organization)
    unit: request
    aggregation: sum
    dimensions:
      - organization
      - stack
      - operation
  - name: cd_api_requests
    description: Content Delivery API request volume served to client applications
    unit: request
    aggregation: sum
    dimensions:
      - organization
      - stack
      - environment
  - name: bandwidth
    description: Egress bandwidth from the Content Delivery API and asset CDN
    unit: GB
    aggregation: sum
    dimensions:
      - organization
      - region
principles:
  - name: Visibility
    description: Use the Contentstack Audit Logs and per-stack usage views; correlate Content Management
      API call volume against the documented per-organization rate ceiling to detect when the plan needs
      to be raised.
  - name: Allocation
    description: Allocate the bundled subscription across business units by stack ownership and active
      user-seat counts; tag API tokens by consuming application for downstream chargeback.
  - name: Optimization
    description: Cache Content Delivery API responses at the CDN / edge; consolidate stacks where business-unit
      isolation isn't required; batch Content Management writes via bulk endpoints (mind the separate
      1 req/s bulk ceiling); right-size environment count.
  - name: Accountability
    description: Digital-experience / marketing-engineering teams typically own the Contentstack subscription;
      individual product teams accountable for stack-level usage and per-application API churn.
maintainers:
